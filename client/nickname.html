<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Media Pool — What's your name?</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-900 min-h-screen flex flex-col items-center justify-center p-6 text-white">
  <div x-data="nicknameForm()" class="text-center max-w-sm w-full">
    <div class="text-6xl mb-6">👋</div>
    <h1 class="text-2xl font-bold mb-2">Welcome!</h1>
    <p class="text-gray-400 mb-8">What should we call you?</p>

    <input x-model="name"
           @keydown.enter="submit()"
           maxlength="20"
           placeholder="Your name"
           autofocus
           class="w-full bg-gray-800 text-white placeholder-gray-500 border border-white/10 rounded-xl px-4 py-3 text-center text-lg focus:outline-none focus:border-indigo-500 mb-1">
    <p class="text-right text-xs text-gray-600 mb-4" x-text="name.length + ' / 20'"></p>

    <template x-if="error">
      <p x-text="error" class="text-red-400 text-sm mb-3"></p>
    </template>

    <button @click="submit()"
            :disabled="submitting"
            class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-95 disabled:opacity-50 text-white font-semibold py-3 rounded-xl transition mb-3">
      <span x-show="!submitting">Join Event</span>
      <span x-show="submitting" class="inline-block animate-spin">↻</span>
    </button>

    <button @click="skip()"
            :disabled="submitting"
            class="text-gray-500 hover:text-gray-300 disabled:opacity-40 text-sm transition">
      Skip
    </button>
  </div>

  <script>
    function nicknameForm() {
      return {
        name: '',
        submitting: false,
        error: '',

        async submit() {
          this.submitting = true;
          this.error = '';
          try {
            const res = await fetch('/api/auth/nickname', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ nickname: this.name.trim() }),
            });
            if (res.status === 401) { location.href = '/login'; return; }
            if (!res.ok) throw new Error('Server error');
            location.href = '/';
          } catch {
            this.error = 'Something went wrong — please try again.';
            this.submitting = false;
          }
        },

        skip() {
          this.name = '';
          this.submit();
        },
      };
    }
  </script>
</body>
</html>
